<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Transfer Money</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            margin: 40px;
        }

        .form-container{
            max-width: 400px;
        }

        label{
            display: block;
            margin-top: 10px;
        }

        input{
            width: 100%;
            padding: 6px;
            margin-top: 4px;
        }

        button{
            margin-top: 15px;
            padding: 8px 14px;
            cursor: pointer;
        }

        .nav-button{
            display: inline-block;
            margin-bottom: 20px;
            padding: 6px 12px;
            background-color: #e0e0e0;
            text-decoration: none;
            color: black;
            border: 1px solid #333;
}

    </style>
</head>
<body>

<a href="index.html" class="nav-button">Back to menu</a>

<h2>Transfer</h2>

<div class="form-container">

    <label for="sender">Sender Account</label>
    <input id="sender" placeholder="Sender account">

    <label for="receiver">Receiver Account</label>
    <input id="receiver" placeholder="Receiver account">

    <label for="amount">Amount</label>
    <input id="amount" type="number" placeholder="Amount">

    <button onclick="transfer()">Transfer</button>

</div>

<script>

    async function transfer(){

    const data = {
        senderAccountNumber: document.getElementById("sender").value,
        receiverAccountNumber: document.getElementById("receiver").value,
        amount: parseFloat(document.getElementById("amount").value)
    }

    const response = await fetch("/api/transactions",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body: JSON.stringify(data)
    })

    if(response.ok){

        const result = await response.json()

        alert("Transaction successful. ID: " + result.id)

    }else{

        const error = await response.text()

        alert("Transaction failed: " + error)

    }
}

</script>

</body>
</html>
